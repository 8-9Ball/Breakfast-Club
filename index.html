<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CPA – This Week's Match</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f4; --card: #ffffff;
    --text: #1a1a18; --text2: #6b6b67; --text3: #9a9a96;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --radius: 12px; --radius-lg: 16px;
    --green-bg: #EAF3DE; --green: #3B6D11; --green-bd: #639922;
    --blue-bg: #E6F1FB;  --blue:  #185FA5; --blue-bd:  #378ADD;
    --amber-bg: #FAEEDA; --amber: #854F0B; --amber-bd: #BA7517;
    --red-bg: #FCEBEB;   --red:   #A32D2D; --red-bd:   #E24B4A;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141412; --card: #1e1e1c;
      --text: #f0f0ec; --text2: #9a9a96; --text3: #6b6b67;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --green-bg: #172d0a; --green: #90c450; --green-bd: #3B6D11;
      --blue-bg:  #0d2540; --blue:  #7aaee0; --blue-bd:  #185FA5;
      --amber-bg: #2d1f06; --amber: #e8a048; --amber-bd: #854F0B;
      --red-bg:   #2d0d0d; --red:   #e08080; --red-bd:   #A32D2D;
    }
  }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: flex-start; justify-content: center;
    padding: 1.5rem 1rem 3rem;
  }
  .wrap { width: 100%; max-width: 420px; }

  .logo { text-align: center; margin-bottom: 1.75rem; }
  .logo .ball { font-size: 40px; display: block; margin-bottom: 6px; }
  .logo h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  .logo p  { font-size: 13px; color: var(--text2); margin-top: 3px; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem 1.25rem; margin-bottom: 1rem; }
  .card-label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }

  /* name selector */
  .name-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .name-btn {
    padding: 12px 10px; font-size: 14px; font-weight: 500;
    border: 1.5px solid var(--border2); border-radius: var(--radius);
    background: var(--bg); color: var(--text2);
    cursor: pointer; text-align: center; transition: all .15s;
    font-family: inherit;
  }
  .name-btn:hover { border-color: var(--text3); color: var(--text); }
  .name-btn.selected {
    border-color: var(--text); background: var(--text);
    color: var(--card); font-weight: 600;
  }

  /* availability buttons */
  .avail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .avail-big {
    padding: 18px 12px; font-size: 14px; font-weight: 600;
    border: 2px solid var(--border2); border-radius: var(--radius);
    background: var(--bg); color: var(--text2);
    cursor: pointer; text-align: center; line-height: 1.4;
    transition: all .15s; font-family: inherit;
  }
  .avail-big .icon { font-size: 22px; display: block; margin-bottom: 5px; }
  .avail-big:hover { border-color: var(--text3); color: var(--text); }
  .avail-big.sel-both  { background: var(--green-bg); border-color: var(--green-bd); color: var(--green); }
  .avail-big.sel-eight { background: var(--blue-bg);  border-color: var(--blue-bd);  color: var(--blue);  }
  .avail-big.sel-nine  { background: var(--amber-bg); border-color: var(--amber-bd); color: var(--amber); }
  .avail-big.sel-out   { background: var(--red-bg);   border-color: var(--red-bd);   color: var(--red);   }

  /* stats strip */
  .stats-strip { display: flex; gap: 12px; font-size: 12px; color: var(--text2); margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); flex-wrap: wrap; }
  .stat-item strong { color: var(--text); }

  /* message preview */
  .msg-box {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
    font-size: 14px; line-height: 1.65; color: var(--text);
    white-space: pre-wrap; word-break: break-word;
    margin-bottom: 12px;
  }
  .copy-btn {
    width: 100%; padding: 14px; font-size: 15px; font-weight: 600;
    border: none; border-radius: var(--radius);
    background: #25D366; color: #fff;
    cursor: pointer; font-family: inherit; transition: opacity .15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .copy-btn:hover { opacity: .9; }
  .copy-btn:active { opacity: .8; transform: scale(.99); }
  .copy-btn.copied { background: var(--green-bd); }

  .hint { font-size: 11px; color: var(--text3); text-align: center; margin-top: 8px; }

  /* note textarea */
  .note-area {
    width: 100%; padding: 10px 12px; font-size: 14px; line-height: 1.5;
    border: 1.5px solid var(--border2); border-radius: var(--radius);
    background: var(--bg); color: var(--text); font-family: inherit;
    resize: none; min-height: 80px; transition: border-color .15s;
  }
  .note-area:focus { outline: none; border-color: var(--text2); }
  .note-area::placeholder { color: var(--text3); }

  /* locked state */
  .locked { opacity: .35; pointer-events: none; user-select: none; }
  .step-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--text); color: var(--card);
    font-size: 11px; font-weight: 700; margin-right: 6px; flex-shrink: 0;
  }
  .step-header { display: flex; align-items: center; margin-bottom: 10px; }
  .step-title { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; }
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<textarea id="copy-ta" style="position:fixed;left:-9999px;top:0"></textarea>

<script>
// ── Roster (captain updates this list to match the master file) ──────────────
const PLAYERS = [
  { name: 'Chris Masters',    h8: 7, h9: 8, w8: 1,  g8: 3,  w9: 7,  g9: 11 },
  { name: 'Mark Mazzon',      h8: 6, h9: 5, w8: 6,  g8: 10, w9: 2,  g9: 4  }, 
  { name: 'Brad Allen',       h8: 5, h9: 5, w8: 5,  g8: 10, w9: 8,  g9: 11 },
  { name: 'Dan Piitz',        h8: 5, h9: 4, w8: 4,  g8: 7,  w9: 6,  g9: 8  },
  { name: 'Adrian Samadian',  h8: 4, h9: 5, w8: 5,  g8: 10, w9: 6,  g9: 9  },
  { name: 'Zoran Janjanin',   h8: 3, h9: 3, w8: 0,  g8: 0,  w9: 0,  g9: 0  },
  { name: 'Aman Verma',       h8: 2, h9: 2, w8: 1,  g8: 12, w9: 5,  g9: 12 },
];

// ── Captain's WhatsApp number (include country code, no + or spaces) ─────────
const CAPTAIN_NUMBER = '';   // e.g. '14165550123'  — leave blank to use plain copy

// ── State ────────────────────────────────────────────────────────────────────
let selectedPlayer = null;
let selectedAvail  = null;
let noteText       = '';
let copied = false;

// ── Helpers ──────────────────────────────────────────────────────────────────
function pct(w, g) { return g > 0 ? Math.round(w / g * 100) : 0; }

const AVAIL_OPTIONS = [
  { key: 'both',  cls: 'sel-both',  icon: '🎱', label: 'Both games'   },
  { key: 'eight', cls: 'sel-eight', icon: '🔵', label: '8-ball only'  },
  { key: 'nine',  cls: 'sel-nine',  icon: '🟡', label: '9-ball only'  },
  { key: 'out',   cls: 'sel-out',   icon: '❌', label: 'Not available'},
];

function buildMessage(player, avail, note) {
  const labels = { both: 'both 8-ball and 9-ball', eight: '8-ball only', nine: '9-ball only', out: 'not available' };
  const emoji  = { both: '✅', eight: '🔵', nine: '🟡', out: '❌' };
  const lines = [
    `🎱 *CPA Match Availability*`,
    ``,
    `Hi — *${player.name}* here.`,
    `I'm *${labels[avail]}* this week. ${emoji[avail]}`,
    ``,
    `8-ball SL ${player.h8} (${player.w8}/${player.g8} wins · ${pct(player.w8, player.g8)}%)`,
    `9-ball SL ${player.h9} (${player.w9}/${player.g9} wins · ${pct(player.w9, player.g9)}%)`,
  ];
  if (note && note.trim()) {
    lines.push(``);
    lines.push(`📝 ${note.trim()}`);
  }
  return lines.join('\n');
}

function render() {
  const app = document.getElementById('app');
  const player = selectedPlayer !== null ? PLAYERS[selectedPlayer] : null;
  const avail  = selectedAvail;
  const msg    = player && avail ? buildMessage(player, avail, noteText) : null;

  app.innerHTML = `
    <div class="logo">
      <span class="ball">🎱</span>
      <h1>This Week's Match</h1>
      <p>Let your captain know if you're in</p>
    </div>

    <!-- STEP 1: who are you -->
    <div class="card">
      <div class="step-header">
        <span class="step-num">1</span>
        <span class="step-title">Who are you?</span>
      </div>
      <div class="name-grid">
        ${PLAYERS.map((p, i) => `
          <button class="name-btn${selectedPlayer === i ? ' selected' : ''}" onclick="selectPlayer(${i})">
            ${p.name}
          </button>
        `).join('')}
      </div>
    </div>

    <!-- STEP 2: availability -->
    <div class="card${player ? '' : ' locked'}">
      <div class="step-header">
        <span class="step-num">2</span>
        <span class="step-title">Your availability this week</span>
      </div>
      <div class="avail-grid">
        ${AVAIL_OPTIONS.map(o => `
          <button class="avail-big${avail === o.key ? ' ' + o.cls : ''}" onclick="selectAvail('${o.key}')">
            <span class="icon">${o.icon}</span>${o.label}
          </button>
        `).join('')}
      </div>
      ${player ? `
        <div class="stats-strip">
          <span>8-ball: SL <strong>${player.h8}</strong> · <strong>${pct(player.w8,player.g8)}%</strong> win rate</span>
          <span>9-ball: SL <strong>${player.h9}</strong> · <strong>${pct(player.w9,player.g9)}%</strong> win rate</span>
        </div>
      ` : ''}
    </div>

    <!-- STEP 3: optional note -->
    <div class="card${avail ? '' : ' locked'}">
      <div class="step-header">
        <span class="step-num">3</span>
        <span class="step-title">Note for captain <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text3)">— optional</span></span>
      </div>
      <textarea id="player-note" class="note-area" maxlength="200"
        placeholder="e.g. Can play but need to leave by 10pm, or arriving late…"
        oninput="updateNote(this.value)"
      ></textarea>
      <div style="font-size:11px;color:var(--text3);text-align:right;margin-top:4px">
        <span id="note-count">${noteText.length}</span>/200
      </div>
    </div>

    <!-- STEP 4: send -->
    <div class="card${msg ? '' : ' locked'}">
      <div class="step-header">
        <span class="step-num">4</span>
        <span class="step-title">Send to captain</span>
      </div>
      ${msg ? `
        <div class="msg-box">${msg.replace(/\*/g,'').replace(/_/g,'')}</div>
        ${CAPTAIN_NUMBER
          ? `<a href="https://wa.me/${CAPTAIN_NUMBER}?text=${encodeURIComponent(msg)}" target="_blank" style="text-decoration:none">
               <button class="copy-btn" style="background:#25D366">
                 <span>Open in WhatsApp</span>
               </button>
             </a>`
          : `<button class="copy-btn${copied ? ' copied' : ''}" onclick="doCopy()">
               ${copied ? '✓ Copied — paste into WhatsApp' : 'Copy message'}
             </button>`
        }
        <p class="hint">${CAPTAIN_NUMBER ? 'Tap to open WhatsApp with this message pre-filled' : 'Then paste into your team WhatsApp chat'}</p>
      ` : '<p style="font-size:13px;color:var(--text3)">Complete steps 1 and 2 first</p>'}
    </div>
  `;

  // Restore textarea value and cursor position after innerHTML wipe
  const ta = document.getElementById('player-note');
  if (ta) { ta.value = noteText; }
}

function selectPlayer(i) {
  selectedPlayer = (selectedPlayer === i) ? null : i;
  selectedAvail  = null;
  noteText       = '';
  copied = false;
  render();
}

function selectAvail(key) {
  selectedAvail = (selectedAvail === key) ? null : key;
  copied = false;
  render();
}

function updateNote(val) {
  noteText = val;
  // Update character counter and message preview without full re-render
  const counter = document.getElementById('note-count');
  if (counter) counter.textContent = val.length;
  // Refresh the message preview box if visible
  const msgBox = document.querySelector('.msg-box');
  if (msgBox && selectedPlayer !== null && selectedAvail) {
    const player = PLAYERS[selectedPlayer];
    const msg = buildMessage(player, selectedAvail, noteText);
    msgBox.textContent = msg.replace(/\*/g,'').replace(/_/g,'');
    // Update copy button href if using WhatsApp direct link
    const waLink = document.querySelector('a[href^="https://wa.me"]');
    if (waLink) waLink.href = `https://wa.me/${CAPTAIN_NUMBER}?text=${encodeURIComponent(msg)}`;
  }
}

function doCopy() {
  const player = PLAYERS[selectedPlayer];
  const msg = buildMessage(player, selectedAvail, noteText);
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(msg).then(() => { copied = true; render(); setTimeout(() => { copied = false; render(); }, 3000); }).catch(() => fbCopy(msg));
  } else { fbCopy(msg); }
}

function fbCopy(txt) {
  const ta = document.getElementById('copy-ta');
  ta.value = txt; ta.style.display = 'block'; ta.select();
  try { document.execCommand('copy'); copied = true; render(); setTimeout(() => { copied = false; render(); }, 3000); } catch {}
  ta.style.display = 'none';
}

render();
</script>
</body>
</html>
